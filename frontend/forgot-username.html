<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home School Platform - Forgot Username</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🔑 Forgot Username</h1>
            <p class="subtitle">Enter your email and we'll send your username.</p>

            <form id="forgotUsernameForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter the email you used to register">
                </div>
                <div id="usernameMessage" style="color: var(--text-muted); margin-bottom: 15px; display: none; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 14px;"></div>
                <button type="submit" class="btn btn-primary btn-block">Send Username</button>
            </form>

            <div style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                <a href="login.html" style="color: var(--primary-light);">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotUsernameForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const messageEl = document.getElementById('usernameMessage');
            
            try {
                const response = await fetch('/api/v1/auth/forgot-username', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                messageEl.style.color = response.ok ? '#10b981' : 'var(--danger)';
                messageEl.textContent = data.message;
                messageEl.style.display = 'block';
                
                if (response.ok) {
                    // Disable form after successful submission
                    document.getElementById('email').disabled = true;
                    document.querySelector('#forgotUsernameForm button').disabled = true;
                    document.querySelector('#forgotUsernameForm button').textContent = 'Check Your Email';
                }
            } catch (err) {
                messageEl.style.color = 'var(--danger)';
                messageEl.textContent = 'An error occurred. Please try again.';
                messageEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
