<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson - My Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: #8b5cf6;
            text-decoration: none;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: #8b5cf6;
            color: white;
        }

        .btn-primary:hover {
            background: #6d28d9;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-secondary {
            background: #334155;
            color: white;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        .lesson-header {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .lesson-subject {
            color: #8b5cf6;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .lesson-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .lesson-meta {
            color: #94a3b8;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .lesson-content {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            min-height: 300px;
        }

        .content-video {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 0.5rem;
            background: #0f172a;
        }

        .content-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #e2e8f0;
        }

        .content-link {
            display: inline-block;
            background: #8b5cf6;
            color: white;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
        }

        .content-link:hover {
            background: #6d28d9;
        }

        .worksheet-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .worksheet-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #8b5cf6;
        }

        .worksheet-pdf {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 0.5rem;
            background: white;
        }

        .progress-bar {
            height: 1rem;
            background: #334155;
            border-radius: 0.5rem;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            transition: width 0.3s ease;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 2000;
        }

        .toast {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1rem 1.5rem;
            margin-bottom: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .lesson-title {
                font-size: 1.5rem;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="navbar-brand">🌟 My Learning</a>
        <a href="child-dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
    </nav>

    <div class="container">
        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>

        <!-- Lesson Header -->
        <div class="lesson-header">
            <div class="lesson-subject" id="lesson-subject">Loading...</div>
            <div class="lesson-title" id="lesson-title">Loading...</div>
            <div class="lesson-meta">
                <span id="lesson-difficulty">Loading...</span>
                <span id="lesson-points">⭐ Loading...</span>
            </div>
        </div>

        <!-- Lesson Content -->
        <div class="lesson-content" id="lesson-content">
            <p style="color: var(--text-muted);">Loading lesson content...</p>
        </div>

        <!-- Worksheet Section (if applicable) -->
        <div class="worksheet-section" id="worksheet-section" style="display: none;">
            <div class="worksheet-title">📝 Worksheet</div>
            <div id="worksheet-content">
                <p style="color: var(--text-muted);">Loading worksheet...</p>
            </div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <a href="child-dashboard.html" class="btn btn-secondary">← Back to Today</a>
            <button class="btn btn-success" id="complete-btn" onclick="completeLesson()">
                ✅ Complete Lesson
            </button>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { apiGet, apiPost, logout } from './js/api.js';

        let lessonId = null;
        let worksheetId = null;
        let currentLesson = null;

        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        lessonId = urlParams.get('id');
        worksheetId = urlParams.get('worksheet');

        if (!lessonId) {
            document.getElementById('lesson-content').innerHTML = '<p style="color: #ef4444;">No lesson ID provided</p>';
        } else {
            loadLesson();
        }

        async function loadLesson() {
            try {
                const response = await apiGet(`/api/v1/lessons/${lessonId}`);
                currentLesson = response;
                
                // Update UI
                document.getElementById('lesson-subject').textContent = response.subject;
                document.getElementById('lesson-title').textContent = response.title;
                document.getElementById('lesson-difficulty').textContent = response.difficulty || 'Medium';
                document.getElementById('lesson-points').textContent = `⭐ ${response.points_reward} pts`;
                
                // Render content based on type
                renderContent(response);
                
                // Show worksheet if attached
                if (response.worksheet_id) {
                    loadWorksheet(response.worksheet_id);
                }
                
                // Update progress bar
                updateProgress(50); // Lesson started
            } catch (err) {
                console.error('Failed to load lesson:', err);
                document.getElementById('lesson-content').innerHTML = '<p style="color: #ef4444;">Failed to load lesson</p>';
            }
        }

        function renderContent(lesson) {
            const container = document.getElementById('lesson-content');
            
            if (lesson.content_type === 'video') {
                container.innerHTML = `
                    <video class="content-video" controls>
                        <source src="${lesson.content_url}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                `;
            } else if (lesson.content_type === 'link') {
                container.innerHTML = `
                    <div class="content-text">
                        <p style="margin-bottom: 1rem;">${lesson.description || 'No description available'}</p>
                        <a href="${lesson.content_url}" target="_blank" class="content-link">
                            🔗 Open Resource
                        </a>
                    </div>
                `;
            } else if (lesson.content_type === 'text') {
                container.innerHTML = `
                    <div class="content-text">
                        ${lesson.description || 'No content available'}
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="content-text">
                        <p>${lesson.description || 'No content available'}</p>
                    </div>
                `;
            }
        }

        async function loadWorksheet(worksheetId) {
            try {
                const worksheet = await apiGet(`/api/v1/worksheets/${worksheetId}`);
                const section = document.getElementById('worksheet-section');
                const content = document.getElementById('worksheet-content');
                
                section.style.display = 'block';
                
                if (worksheet.worksheet_type === 'uploaded') {
                    content.innerHTML = `
                        <iframe class="worksheet-pdf" src="${worksheet.file_url}" title="${worksheet.title}"></iframe>
                        <a href="${worksheet.file_url}" download class="btn btn-primary" style="margin-top: 1rem;">
                            📥 Download Worksheet
                        </a>
                    `;
                } else if (worksheet.worksheet_type === 'interactive') {
                    renderInteractiveWorksheet(worksheet);
                }
            } catch (err) {
                console.error('Failed to load worksheet:', err);
            }
        }

        function renderInteractiveWorksheet(worksheet) {
            const content = document.getElementById('worksheet-content');
            
            let html = '<div class="worksheet-questions">';
            worksheet.questions.forEach((q, index) => {
                html += `<div class="question-card" style="margin-bottom: 2rem; padding: 1rem; background: rgba(15, 23, 42, 0.5); border-radius: 0.5rem;">`;
                html += `<h4 style="margin-bottom: 1rem;">Question ${index + 1}</h4>`;
                html += `<p style="margin-bottom: 1rem;">${q.question_text}</p>`;
                
                if (q.question_type === 'multiple_choice' && q.options) {
                    q.options.forEach(option => {
                        html += `
                            <label style="display: block; margin: 0.5rem 0; padding: 0.5rem; background: rgba(51, 65, 85, 0.3); border-radius: 0.25rem; cursor: pointer;">
                                <input type="radio" name="q${index}" value="${option}"> ${option}
                            </label>
                        `;
                    });
                } else if (q.question_type === 'true_false') {
                    html += `
                        <label style="display: inline-block; margin: 0.5rem; padding: 0.5rem; background: rgba(51, 65, 85, 0.3); border-radius: 0.25rem; cursor: pointer;">
                            <input type="radio" name="q${index}" value="true"> True
                        </label>
                        <label style="display: inline-block; margin: 0.5rem; padding: 0.5rem; background: rgba(51, 65, 85, 0.3); border-radius: 0.25rem; cursor: pointer;">
                            <input type="radio" name="q${index}" value="false"> False
                        </label>
                    `;
                } else if (q.question_type === 'short_answer') {
                    html += `<textarea class="answer-input" name="q${index}" rows="3" style="width: 100%; padding: 0.5rem; border-radius: 0.25rem; background: #334155; color: white; border: 1px solid #475569;"></textarea>`;
                }
                
                html += `</div>`;
            });
            html += '</div>';
            html += `<button class="btn btn-primary" onclick="submitWorksheet(${worksheet.id})">Submit Worksheet</button>`;
            
            content.innerHTML = html;
        }

        function updateProgress(percent) {
            document.getElementById('progress-fill').style.width = `${percent}%`;
        }

        async function completeLesson() {
            if (!currentLesson) return;
            
            try {
                const response = await apiPost(`/api/v1/progress/${lessonId}/complete`, {});
                showToast('🎉 Lesson completed! +' + response.points_earned + ' points', 'success');
                updateProgress(100);
                
                // Auto-redirect after completion
                setTimeout(() => {
                    window.location.href = 'child-dashboard.html';
                }, 2000);
            } catch (err) {
                console.error('Failed to complete lesson:', err);
                showToast('Failed to complete lesson', 'error');
            }
        }

        async function submitWorksheet(worksheetId) {
            // Collect answers
            const answers = {};
            document.querySelectorAll('.answer-input').forEach(input => {
                const name = input.name;
                answers[name] = input.value;
            });
            
            document.querySelectorAll('input[type="radio"]:checked').forEach(input => {
                answers[input.name] = input.value;
            });
            
            try {
                await apiPost(`/api/v1/worksheets/${worksheetId}/submit`, { answers });
                showToast('Worksheet submitted!', 'success');
                updateProgress(75);
            } catch (err) {
                console.error('Failed to submit worksheet:', err);
                showToast('Failed to submit worksheet', 'error');
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
