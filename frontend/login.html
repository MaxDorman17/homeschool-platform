<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home School Platform - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>📚 Home School</h1>
            <p class="subtitle">Welcome back! Sign in to continue learning.</p>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <div id="loginError" style="color: var(--danger); margin-bottom: 15px; display: none;"></div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div style="margin-top: 15px;">
                <div style="text-align: center; margin-bottom: 10px;">
                    <a href="forgot-password.html" style="color: var(--primary-light); font-size: 14px;">Forgot Password?</a>
                    <span style="color: var(--text-muted); margin: 0 10px;">|</span>
                    <a href="forgot-username.html" style="color: var(--primary-light); font-size: 14px;">Forgot Username?</a>
                </div>
                <div style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                    Don't have an account? <a href="register.html" style="color: var(--primary-light);">Create one</a>
                </div>
        </div>
    </div>

    <script type="module">
        import { login } from './js/api.js';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            try {
                const data = await login(username, password);
                // Check role and redirect accordingly
                const me = await fetch('/api/v1/auth/me', {
                    headers: { 'Authorization': `Bearer ${data.access_token}` }
                });
                const user = await me.json();

                if (user.role === 'parent') {
                    localStorage.setItem('user_role', 'parent');
                    window.location.href = 'parent-dashboard.html';
                } else {
                    localStorage.setItem('user_role', 'child');
                    window.location.href = 'child-dashboard.html';
                }
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
