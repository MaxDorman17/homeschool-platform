<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home School Platform - Reset Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🔑 Reset Password</h1>
            <p class="subtitle" id="resetSubtitle">Enter your new password.</p>

            <div id="usernameDisplay" style="color: var(--text-muted); margin-bottom: 15px; display: none; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 14px;"></div>
            <div id="tokenError" style="color: var(--danger); margin-bottom: 15px; display: none; padding: 10px; background: rgba(255,0,0,0.1); border-radius: 8px; font-size: 14px;"></div>

            <form id="resetPasswordForm" style="display: none;">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required minlength="8" placeholder="Minimum 8 characters">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required minlength="8" placeholder="Confirm your new password">
                </div>
                <div id="passwordMessage" style="color: var(--text-muted); margin-bottom: 15px; display: none; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 14px;"></div>
                <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
            </form>

            <div style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                <a href="login.html" style="color: var(--primary-light);">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const username = urlParams.get('username');
        
        if (!token) {
            document.getElementById('tokenError').textContent = 'Invalid or missing reset token.';
            document.getElementById('tokenError').style.display = 'block';
        } else {
            // Show username if it's a username reminder
            if (username) {
                document.getElementById('usernameDisplay').textContent = `Username: ${username}`;
                document.getElementById('usernameDisplay').style.display = 'block';
                document.getElementById('resetSubtitle').textContent = 'Your username has been sent. Enter a new password below.';
            }
            
            // Show password reset form
            document.getElementById('resetPasswordForm').style.display = 'block';
            
            document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const messageEl = document.getElementById('passwordMessage');
                
                if (newPassword !== confirmPassword) {
                    messageEl.style.color = 'var(--danger)';
                    messageEl.textContent = 'Passwords do not match.';
                    messageEl.style.display = 'block';
                    return;
                }
                
                try {
                    const response = await fetch('/api/v1/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, password: newPassword })
                    });
                    
                    const data = await response.json();
                    
                    messageEl.style.color = response.ok ? '#10b981' : 'var(--danger)';
                    messageEl.textContent = data.message;
                    messageEl.style.display = 'block';
                    
                    if (response.ok) {
                        // Disable form
                        document.getElementById('resetPasswordForm').style.display = 'none';
                        
                        // Show success message and redirect to login
                        document.getElementById('tokenError').style.color = '#10b981';
                        document.getElementById('tokenError').textContent = 'Password reset successful! Redirecting to login...';
                        document.getElementById('tokenError').style.display = 'block';
                        
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    }
                } catch (err) {
                    messageEl.style.color = 'var(--danger)';
                    messageEl.textContent = 'An error occurred. Please try again.';
                    messageEl.style.display = 'block';
                }
            });
        }
    </script>
</body>
</html>
